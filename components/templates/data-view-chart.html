<template tag-name="data-view-chart">
	<div class="lyte-chart-wrapper">
		<lyte-chart
			lt-prop-type="{{ltPropType}}"
			lt-prop-title="{{ltPropTitle}}"
			lt-prop-series-data="{{ltPropSeriesData}}"
			lt-prop-meta-data-axes="{{ltPropMetaDataAxes}}"
			lt-prop-meta-data-columns="{{ltPropMetaDataColumns}}">
		</lyte-chart>
	</div>
</template>
