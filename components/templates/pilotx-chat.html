<template tag-name="pilotx-chat">
    <!-- Floating Chat Launcher -->
    <button class="chat-launcher" id="chatLauncher">
        <span class="chat-launcher-icon"><i class="fas fa-robot"></i></span>
        <span class="chat-launcher-label">WorkPilot</span>
    </button>

    <!-- Chat Wrapper: states → popup | modal -->
    <div class="chat-wrapper" id="chatWrapper">
        <div class="chat-backdrop" id="chatBackdrop"></div>
        <div class="chat-panel" id="chatPanel">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn" title="New Chat">
                    <i class="fas fa-plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            <div class="sidebar-sessions" id="sessionList">
                <!-- Sessions will be rendered here -->
            </div>
            <div class="sidebar-footer">
                <button class="clear-all-btn" id="clearAllBtn">
                    <i class="fas fa-trash-alt"></i>
                    <span>Clear All Chats</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-title">
                    <span id="currentSessionTitle">New Chat</span>
                </div>
                <div class="topbar-actions">
                    <button class="topbar-btn chat-mode-expand" id="expandChatBtn" title="Expand to full view">
                        <i class="fas fa-expand-alt"></i>
                    </button>
                    <button class="topbar-btn chat-mode-collapse" id="collapseChatBtn" title="Collapse to popup">
                        <i class="fas fa-compress-alt"></i>
                    </button>
                    <button class="topbar-btn" id="closeChatBtn" title="Close chat">
                        <i class="fas fa-times"></i>
                    </button>

                </div>
            </header>

            <!-- Chat Messages -->
            <div class="chat-container" id="chatContainer">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <h1>WorkPilot</h1>
                    <p>Your AI-powered CRM assistant. Ask about leads, deals, follow-ups, or pipeline activity.</p>
                    <div class="suggestions" id="suggestions">
                        <button class="suggestion-chip" data-prompt="Get top 10 leads">
                            <i class="fas fa-users"></i>
                            <span>Top 10 leads</span>
                            <small>Array of records</small>
                        </button>
                        <button class="suggestion-chip" data-prompt="Get first lead detail">
                            <i class="fas fa-id-card"></i>
                            <span>Lead detail</span>
                            <small>Single record</small>
                        </button>
                        <button class="suggestion-chip" data-prompt="Get current CRM environment">
                            <i class="fas fa-server"></i>
                            <span>CRM Environment</span>
                            <small>String response</small>
                        </button>
                        <button class="suggestion-chip" data-prompt="Get all the deal stages">
                            <i class="fas fa-list-ul"></i>
                            <span>Deal stages</span>
                            <small>String array</small>
                        </button>
                        <button class="suggestion-chip" data-prompt="Get total expected revenue from deals">
                            <i class="fas fa-dollar-sign"></i>
                            <span>Total revenue</span>
                            <small>Number</small>
                        </button>
                        <button class="suggestion-chip" data-prompt="Get Documents module">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span>Error scenario</span>
                            <small>Error response</small>
                        </button>
                    </div>
                </div>

                <!-- Messages will be rendered here -->
                <div class="messages-wrapper" id="messagesWrapper"></div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <textarea
                        id="promptInput"
                        placeholder="Ask WorkPilot about leads, deals, follow-ups, or pipeline changes"
                        rows="1"
                        autofocus
                    ></textarea>
                    <button class="send-btn" id="sendBtn" title="Send">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <div class="input-footer">
                    <span>WorkPilot can make mistakes. Verify important information.</span>
                </div>
            </div>
        </main>
    </div><!-- .app-container -->
        </div><!-- .chat-panel -->
    </div><!-- .chat-wrapper -->

    <!-- View Modal for expanded views -->
    <div class="view-modal-overlay" id="viewModalOverlay">
        <div class="view-modal" id="viewModal">
            <div class="view-modal-header">
                <h3 id="viewModalTitle">Data View</h3>
                <button class="view-modal-close" id="viewModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="view-modal-body" id="viewModalBody"></div>
        </div>
    </div>

</template>
